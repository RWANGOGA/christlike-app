version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: joapp_user
      POSTGRES_PASSWORD: Jesus1
      POSTGRES_DB: joapp_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Healthcheck so the backend's condition: service_healthy works
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joapp_user -d joapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend
  backend:
    build: ./backend
    ports:
      - "8001:8000"   # host 8001 -> container 8000 (container stays on 8000 internally)
    environment:
      - DATABASE_URL=postgresql://joapp_user:Jesus1@db:5432/joapp_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # 3. Next.js Frontend
  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      # Points at the HOST-side port (8001) since the browser calls this directly.
      # Only use http://backend:8000 instead if fetching from getServerSideProps
      # or App Router server components (server-side code runs inside the
      # Docker network, where the backend is reachable as "backend" on its
      # internal port 8000 — not via the host-mapped 8001).
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: {}