version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: joapp_user
      POSTGRES_PASSWORD: Jesus1
      POSTGRES_DB: joapp_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ADDED: Healthcheck so the backend condition: service_healthy works
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joapp_user -d joapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://joapp_user:Jesus1@db:5432/joapp_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # 3. Next.js Frontend
  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      # Note: Change this to http://backend:8000 if you do data fetching 
      # inside getServerSideProps or App Router server components!
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: {} # FIXED: Added the required braces here